<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="tac-csrf" content="__CSRF_TOKEN__" />
    <title>Technical Article Curation Admin</title>
    <link rel="stylesheet" href="/admin/static/admin.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Technical Article Curation</p>
          <h1>管理控制台</h1>
        </div>
        <div class="status" id="runtime-status">连接中</div>
      </header>

      <section class="summary-grid" id="summary-grid" aria-label="文章状态概览"></section>

      <section class="toolbar" aria-label="流水线任务">
        <button data-job="discover">Discover</button>
        <button data-job="fetch">Fetch</button>
        <button data-job="evaluate">Evaluate</button>
        <button data-job="publish">Publish</button>
        <button data-job="run" class="primary">Run All</button>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>所有文章</h2>
          <div class="filters">
            <input id="search-input" type="search" placeholder="搜索标题、URL、来源" />
            <select id="status-filter">
              <option value="">全部状态</option>
              <option value="candidate">candidate</option>
              <option value="accepted">accepted</option>
              <option value="rejected">rejected</option>
              <option value="low_confidence">low_confidence</option>
              <option value="archived">archived</option>
            </select>
            <select id="source-filter">
              <option value="">全部来源</option>
            </select>
            <label><input id="failed-only" type="checkbox" /> 只看失败</label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标题</th>
                <th>来源</th>
                <th>状态</th>
                <th>抓取</th>
                <th>评估</th>
                <th>重试</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="articles-body"></tbody>
          </table>
        </div>
        <div class="pager">
          <button id="prev-page">上一页</button>
          <span id="page-label">第 1 页</span>
          <button id="next-page">下一页</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>最近失败</h2>
          <button id="refresh-failures">刷新</button>
        </div>
        <div id="failures-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>最近任务</h2>
          <button id="refresh-jobs">刷新</button>
        </div>
        <div id="jobs-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>信源 YAML</h2>
          <button id="save-sources" class="primary">保存</button>
        </div>
        <textarea id="sources-editor" spellcheck="false"></textarea>
        <p id="sources-status" class="muted"></p>
      </section>
    </main>

    <aside class="drawer" id="detail-drawer" aria-hidden="true">
      <div class="drawer-head">
        <h2>文章详情</h2>
        <button id="close-detail">关闭</button>
      </div>
      <pre id="detail-content"></pre>
    </aside>

    <script src="/admin/static/admin.js"></script>
  </body>
</html>
