<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="tac-csrf" content="__CSRF_TOKEN__" />
    <title>技术文章精选管理台</title>
    <link rel="stylesheet" href="/admin/static/admin.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">技术文章精选</p>
          <h1>管理台</h1>
        </div>
        <div class="status" id="runtime-status">连接中</div>
      </header>

      <section class="summary-grid" id="summary-grid" aria-label="文章状态统计"></section>

      <section class="toolbar" aria-label="流水线任务">
        <label>
          开始日期
          <input id="discover-since" type="date" />
        </label>
        <label>
          结束日期
          <input id="discover-until" type="date" />
        </label>
        <button data-job="discover">发现文章</button>
        <button data-job="fetch">抓取内容</button>
        <button data-job="evaluate">评估文章</button>
        <button data-job="publish">发布数据</button>
        <button data-job="run" class="primary">运行全部</button>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>全部文章</h2>
          <div class="filters">
            <input id="search-input" type="search" placeholder="搜索标题、链接或来源" />
            <select id="status-filter">
              <option value="">全部状态</option>
              <option value="candidate">候选</option>
              <option value="accepted">已通过</option>
              <option value="rejected">已拒绝</option>
              <option value="low_confidence">低置信</option>
              <option value="skipped_out_of_range">超出范围</option>
            </select>
            <select id="source-filter">
              <option value="">全部来源</option>
            </select>
            <label><input id="failed-only" type="checkbox" /> 只看失败</label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标题</th>
                <th>来源</th>
                <th>状态</th>
                <th>抓取</th>
                <th>评估</th>
                <th>重试</th>
                <th>发布时间</th>
                <th>更新时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="articles-body"></tbody>
          </table>
        </div>
        <div class="pager">
          <button id="prev-page">上一页</button>
          <span id="page-label">第 1 页</span>
          <button id="next-page">下一页</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>最近失败</h2>
          <button id="refresh-failures">刷新</button>
        </div>
        <div id="failures-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Tag 词库</h2>
          <button id="refresh-tags">刷新</button>
        </div>
        <div class="rsshub-form">
          <label>
            Tag
            <input id="tag-name" type="text" placeholder="Architecture" />
          </label>
          <label>
            说明
            <input id="tag-description" type="text" placeholder="可选说明" />
          </label>
          <button id="create-tag" class="primary">新增 Tag</button>
        </div>
        <p id="tags-status" class="muted"></p>
        <div id="tag-candidates-list" class="list"></div>
        <div id="tags-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>最近任务</h2>
          <button id="refresh-jobs">刷新</button>
        </div>
        <div id="jobs-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>定时计划</h2>
          <button id="refresh-schedules">刷新</button>
        </div>
        <div id="schedules-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>RSSHub 预览</h2>
          <button id="preview-rsshub" class="primary">预览</button>
        </div>
        <div class="rsshub-form">
          <label>
            路由
            <input id="rsshub-route" type="text" placeholder="/zhihu/hot" />
          </label>
          <label>
            实例地址
            <input id="rsshub-instance" type="url" placeholder="http://127.0.0.1:1200" />
          </label>
          <label>
            数量
            <input id="rsshub-limit" type="number" min="1" max="50" value="10" />
          </label>
          <label class="rsshub-params">
            参数 JSON
            <textarea id="rsshub-params" spellcheck="false">{}</textarea>
          </label>
        </div>
        <p id="rsshub-status" class="muted"></p>
        <div id="rsshub-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Sitemap 预览</h2>
          <button id="preview-sitemap" class="primary">预览</button>
        </div>
        <div class="rsshub-form">
          <label>
            Sitemap 链接
            <input id="sitemap-url" type="url" placeholder="https://example.com/sitemap.xml" />
          </label>
          <label>
            数量
            <input id="sitemap-limit" type="number" min="1" max="50" value="10" />
          </label>
        </div>
        <p id="sitemap-status" class="muted"></p>
        <div id="sitemap-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>列表页预览</h2>
          <button id="preview-listing" class="primary">预览</button>
        </div>
        <div class="rsshub-form">
          <label>
            列表页链接
            <input id="listing-url" type="url" placeholder="https://example.com/blog" />
          </label>
          <label>
            链接选择器
            <input id="listing-link-selector" type="text" placeholder="main article a.post-link" />
          </label>
          <label>
            标题选择器（可选）
            <input id="listing-title-selector" type="text" placeholder="main article h2" />
          </label>
          <label>
            基准链接（可选）
            <input id="listing-base-url" type="url" placeholder="https://example.com" />
          </label>
          <label>
            数量
            <input id="listing-limit" type="number" min="1" max="50" value="10" />
          </label>
          <label class="rsshub-params">
            链接匹配规则（每行一条）
            <textarea id="listing-url-patterns" spellcheck="false"></textarea>
          </label>
        </div>
        <p id="listing-status" class="muted"></p>
        <div id="listing-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>信源 YAML</h2>
          <button id="save-sources" class="primary">保存</button>
        </div>
        <textarea id="sources-editor" spellcheck="false"></textarea>
        <p id="sources-status" class="muted"></p>
      </section>
    </main>

    <aside class="drawer" id="detail-drawer" aria-hidden="true">
      <div class="drawer-head">
        <h2>文章详情</h2>
        <button id="close-detail">关闭</button>
      </div>
      <pre id="detail-content"></pre>
    </aside>

    <script src="/admin/static/admin.js"></script>
  </body>
</html>
