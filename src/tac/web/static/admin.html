<!doctype html>
    <html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="tac-csrf" content="__CSRF_TOKEN__" />
    <title>Technical Article Curation Admin</title>
    <link rel="stylesheet" href="/admin/static/admin.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Technical Article Curation</p>
          <h1>Admin Console</h1>
        </div>
        <div class="status" id="runtime-status">Connecting</div>
      </header>

      <section class="summary-grid" id="summary-grid" aria-label="Article status summary"></section>

      <section class="toolbar" aria-label="Pipeline jobs">
        <label>
          Since
          <input id="discover-since" type="date" />
        </label>
        <label>
          Until
          <input id="discover-until" type="date" />
        </label>
        <button data-job="discover">Discover</button>
        <button data-job="fetch">Fetch</button>
        <button data-job="evaluate">Evaluate</button>
        <button data-job="publish">Publish</button>
        <button data-job="run" class="primary">Run All</button>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>All Articles</h2>
          <div class="filters">
            <input id="search-input" type="search" placeholder="Search title, URL, or source" />
            <select id="status-filter">
              <option value="">All statuses</option>
              <option value="candidate">candidate</option>
              <option value="accepted">accepted</option>
              <option value="rejected">rejected</option>
              <option value="low_confidence">low_confidence</option>
              <option value="skipped_out_of_range">skipped_out_of_range</option>
            </select>
            <select id="source-filter">
              <option value="">All sources</option>
            </select>
            <label><input id="failed-only" type="checkbox" /> Failed only</label>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Source</th>
                <th>Status</th>
                <th>Fetch</th>
                <th>Evaluation</th>
                <th>Retries</th>
                <th>Published</th>
                <th>Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="articles-body"></tbody>
          </table>
        </div>
        <div class="pager">
          <button id="prev-page">Previous</button>
          <span id="page-label">Page 1</span>
          <button id="next-page">Next</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Recent Failures</h2>
          <button id="refresh-failures">Refresh</button>
        </div>
        <div id="failures-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Tag Vocabulary</h2>
          <button id="refresh-tags">Refresh</button>
        </div>
        <div class="rsshub-form">
          <label>
            Tag
            <input id="tag-name" type="text" placeholder="Architecture" />
          </label>
          <label>
            Description
            <input id="tag-description" type="text" placeholder="Optional note" />
          </label>
          <button id="create-tag" class="primary">Add Tag</button>
        </div>
        <p id="tags-status" class="muted"></p>
        <div id="tag-candidates-list" class="list"></div>
        <div id="tags-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Recent Jobs</h2>
          <button id="refresh-jobs">Refresh</button>
        </div>
        <div id="jobs-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Schedules</h2>
          <button id="refresh-schedules">Refresh</button>
        </div>
        <div id="schedules-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>RSSHub Preview</h2>
          <button id="preview-rsshub" class="primary">Preview</button>
        </div>
        <div class="rsshub-form">
          <label>
            Route
            <input id="rsshub-route" type="text" placeholder="/zhihu/hot" />
          </label>
          <label>
            Instance
            <input id="rsshub-instance" type="url" placeholder="http://127.0.0.1:1200" />
          </label>
          <label>
            Limit
            <input id="rsshub-limit" type="number" min="1" max="50" value="10" />
          </label>
          <label class="rsshub-params">
            Params JSON
            <textarea id="rsshub-params" spellcheck="false">{}</textarea>
          </label>
        </div>
        <p id="rsshub-status" class="muted"></p>
        <div id="rsshub-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Sitemap Preview</h2>
          <button id="preview-sitemap" class="primary">Preview</button>
        </div>
        <div class="rsshub-form">
          <label>
            Sitemap URL
            <input id="sitemap-url" type="url" placeholder="https://example.com/sitemap.xml" />
          </label>
          <label>
            Limit
            <input id="sitemap-limit" type="number" min="1" max="50" value="10" />
          </label>
        </div>
        <p id="sitemap-status" class="muted"></p>
        <div id="sitemap-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Listing Preview</h2>
          <button id="preview-listing" class="primary">Preview</button>
        </div>
        <div class="rsshub-form">
          <label>
            Listing URL
            <input id="listing-url" type="url" placeholder="https://example.com/blog" />
          </label>
          <label>
            Link Selector
            <input id="listing-link-selector" type="text" placeholder="main article a.post-link" />
          </label>
          <label>
            Title Selector (optional)
            <input id="listing-title-selector" type="text" placeholder="main article h2" />
          </label>
          <label>
            Base URL (optional)
            <input id="listing-base-url" type="url" placeholder="https://example.com" />
          </label>
          <label>
            Limit
            <input id="listing-limit" type="number" min="1" max="50" value="10" />
          </label>
          <label class="rsshub-params">
            URL Patterns (newline separated)
            <textarea id="listing-url-patterns" spellcheck="false"></textarea>
          </label>
        </div>
        <p id="listing-status" class="muted"></p>
        <div id="listing-preview-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Sources YAML</h2>
          <button id="save-sources" class="primary">Save</button>
        </div>
        <textarea id="sources-editor" spellcheck="false"></textarea>
        <p id="sources-status" class="muted"></p>
      </section>
    </main>

    <aside class="drawer" id="detail-drawer" aria-hidden="true">
      <div class="drawer-head">
        <h2>Article Detail</h2>
        <button id="close-detail">Close</button>
      </div>
      <pre id="detail-content"></pre>
    </aside>

    <script src="/admin/static/admin.js"></script>
  </body>
</html>
